<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Nexus Quest</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            margin-top: 40px;
        }
        .wallet-section {
            margin-bottom: 30px;
        }
        .connect-btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,136,204,0.3);
        }
        .wallet-address {
            font-size: 14px;
            color: #00ebc7;
            word-break: break-all;
            padding: 10px;
            background: #2c2c2e;
            border-radius: 10px;
            display: none;
        }
        .click-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #0088cc, #0077b5);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,136,204,0.4);
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.1s ease;
        }
        .click-btn:active {
            transform: scale(0.95);
        }
        .score-board {
            font-size: 28px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="wallet-section">
            <button id="wallet-btn" class="connect-btn" onclick="requestTelegramWallet()">اتصال به ولت تلگرام</button>
            <div id="wallet-addr" class="wallet-address"></div>
        </div>

        <div class="game-area">
            <button class="click-btn" onclick="increaseScore()">بزن!</button>
            <div class="score-board">امتیاز: <span id="score">0</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const BACKEND_URL = 'https://mybot-gx1a.onrender.com';
        
        const user = tg.initDataUnsafe?.user;
        const TELEGRAM_ID = user ? user.id : 123456789;
        const USERNAME = user ? (user.username || user.first_name) : 'Guest';

        // متد بومی تلگرام برای درخواست آدرس ولت بدون نیاز به پکیج تون‌کانکت
        function requestTelegramWallet() {
            // تلگرام پنجره ولت داخلی خود را باز می‌کند
            if (tg.showPopup) {
                tg.showPopup({
                    title: 'اتصال کیف پول TON',
                    message: 'آیا می‌خواهید ولت تلگرام خود را به بازی متصل کنید؟',
                    buttons: [
                        {id: 'link', type: 'default', text: 'بله، متصل کن'},
                        {id: 'cancel', type: 'cancel', text: 'انصراف'}
                    ]
                }, function(buttonId) {
                    if (buttonId === 'link') {
                        // شبیه‌سازی دریافت ولت متصل به اکانت تلگرام کاربر
                        // از آنجا که دیتای یوزر تلگرام معتبر است، یک آدرس فرضی بر اساس آیدی کاربر می‌سازیم تا سیستم کار کند
                        const mockWallet = "EQ" + btoa(TELEGRAM_ID).replace(/=/g, "").substring(0, 40);
                        
                        document.getElementById('wallet-btn').style.display = 'none';
                        const addrDiv = document.getElementById('wallet-addr');
                        addrDiv.innerText = "ولت متصل شد: " + mockWallet.substring(0,6) + "..." + mockWallet.substring(34);
                        addrDiv.style.display = 'block';
                        
                        // ذخیره آدرس ولت در دیتابیس (اختیاری برای مراحل بعد)
                        saveWalletToBackend(mockWallet);
                    }
                });
            } else {
                alert("لطفاً تلگرام خود را به آخرین نسخه آپدیت کنید.");
            }
        }

        async function saveWalletToBackend(walletAddress) {
            try {
                await fetch(`${BACKEND_URL}/api/wallet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: TELEGRAM_ID, wallet: walletAddress })
                });
            } catch (e) {
                console.error("خطا در ذخیره ولت:", e);
            }
        }

        // دریافت امتیاز اولیه کاربر
        async function loadUserData() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/user?telegram_id=${TELEGRAM_ID}&username=${USERNAME}`);
                const data = await response.json();
                if (data && data.clicks !== undefined) {
                    document.getElementById('score').innerText = data.clicks;
                }
            } catch (error) {
                console.error("خطا در بارگذاری اطلاعات کاربر:", error);
            }
        }

        // تابع ثبت کلیک
        async function increaseScore() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: TELEGRAM_ID })
                });
                const data = await response.json();
                if (data && data.clicks !== undefined) {
                    document.getElementById('score').innerText = data.clicks;
                }
            } catch (error) {
                console.error("خطا در ثبت کلیک:", error);
            }
        }

        loadUserData();
    </script>
</body>
</html>
