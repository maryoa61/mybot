<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Nexus Quest</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    
    <style>
        body {
            font-family: sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            margin-top: 40px;
        }
        #ton-connect-btn {
            display: inline-block;
            margin-bottom: 30px;
            min-height: 40px;
        }
        .click-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #0088cc, #0077b5);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,136,204,0.4);
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.1s ease;
        }
        .click-btn:active {
            transform: scale(0.95);
        }
        .score-board {
            font-size: 28px;
            margin-top: 20px;
        }
        .wallet-info {
            font-size: 14px;
            color: #00ebc7;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="ton-connect-btn"></div>
        <div id="wallet-address" class="wallet-info"></div>

        <div class="game-area">
            <button class="click-btn" onclick="increaseScore()">بزن!</button>
            <div class="score-board">امتیاز: <span id="score">0</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const BACKEND_URL = 'https://mybot-gx1a.onrender.com';
        
        const user = tg.initDataUnsafe?.user;
        const TELEGRAM_ID = user ? user.id : 123456789;
        const USERNAME = user ? (user.username || user.first_name) : 'Guest';

        let tonConnectUI;

        // راه‌اندازی دکمه زنده اتصال به کیف پول
        function initTonConnect() {
            try {
                tonConnectUI = new TONConnectUI.TonConnectUI({
                    manifestUrl: 'https://maryoa61.github.io/mybot/tonconnect-manifest.json',
                    buttonRootId: 'ton-connect-btn'
                });

                // گوش دادن به تغییرات وضعیت ولت (وقتی کاربر وصل یا قطع می‌شود)
                tonConnectUI.onStatusChange(wallet => {
                    if (wallet) {
                        const rawAddress = wallet.account.address;
                        // تبدیل آدرس به فرمت کوتاه و خوانا برای نمایش
                        document.getElementById('wallet-address').innerText = 
                            `ولّت متصل شد: ${rawAddress.substring(0, 6)}...${rawAddress.substring(rawAddress.length - 6)}`;
                        
                        // ارسال آدرس واقعی کیف پول به بک‌اِند برای ذخیره در سوپابیس
                        saveWalletToBackend(rawAddress);
                    } else {
                        document.getElementById('wallet-address').innerText = '';
                    }
                });
            } catch (error) {
                console.error("خطا در راه‌اندازی تون‌کانکت زنده:", error);
            }
        }

        // ذخیره آدرس ولت در دیتابیس
        async function saveWalletToBackend(walletAddress) {
            try {
                await fetch(`${BACKEND_URL}/api/wallet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: TELEGRAM_ID, wallet: walletAddress })
                });
            } catch (e) {
                console.error("خطا در ذخیره ولت واقعی:", e);
            }
        }

        // دریافت امتیاز اولیه کاربر
        async function loadUserData() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/user?telegram_id=${TELEGRAM_ID}&username=${USERNAME}`);
                const data = await response.json();
                if (data && data.clicks !== undefined) {
                    document.getElementById('score').innerText = data.clicks;
                }
            } catch (error) {
                console.error("خطا در بارگذاری اطلاعات کاربر:", error);
            }
        }

        // تابع ثبت کلیک
        async function increaseScore() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: TELEGRAM_ID })
                });
                const data = await response.json();
                if (data && data.clicks !== undefined) {
                    document.getElementById('score').innerText = data.clicks;
                }
            } catch (error) {
                console.error("خطا در ثبت کلیک:", error);
            }
        }

        // لود توابع زمان باز شدن مینی‌اپ
        loadUserData();
        initTonConnect();
    </script>
</body>
</html>
