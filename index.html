<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Nexus Quest</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.by/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1c1c1e; color: white; text-align: center; padding: 20px; margin: 0; overflow: hidden; }
        .container { margin-top: 40px; }
        .wallet-section { margin-bottom: 30px; min-height: 45px; }
        .click-btn { width: 160px; height: 160px; border-radius: 50%; border: none; background: radial-gradient(circle, #00aaff, #0077b5); color: white; font-size: 26px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0,170,255,0.5); transition: all 0.1s ease; user-select: none; -webkit-user-select: none; }
        .click-btn:active { transform: scale(0.92); }
        .score-board { font-size: 36px; margin-top: 25px; font-weight: bold; }
        .wallet-info { font-size: 13px; color: #00ebc7; margin-top: 10px; background: #2c2c2e; padding: 8px; border-radius: 8px; display: none; word-break: break-all; }
        #ton-connect-btn div { margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="wallet-section">
            <div id="ton-connect-btn"></div>
            <div id="wallet-address" class="wallet-info"></div>
        </div>
        <div class="game-area">
            <button class="click-btn" onclick="increaseScore()">بزن!</button>
            <div class="score-board"><span id="score">0</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const BACKEND_URL = 'https://mybot-gx1a.onrender.com';
        const TELEGRAM_ID = tg.initDataUnsafe?.user?.id || 123456789;
        const USERNAME = tg.initDataUnsafe?.user?.username || 'Guest';

        let tonConnectUI;

        function initTonConnect() {
            try {
                if (typeof TONConnectUI !== 'undefined') {
                    tonConnectUI = new TONConnectUI.TonConnectUI({
                        manifestUrl: 'https://maryoa61.github.io/mybot/tonconnect-manifest.json',
                        buttonRootId: 'ton-connect-btn'
                    });

                    tonConnectUI.onStatusChange(wallet => {
                        if (wallet) {
                            const realAddress = wallet.account.address;
                            const infoDiv = document.getElementById('wallet-address');
                            infoDiv.innerText = `ولّت متصل شد: ${realAddress.substring(0, 6)}...${realAddress.substring(realAddress.length - 4)}`;
                            infoDiv.style.display = 'block';
                            saveWalletToBackend(realAddress);
                        } else {
                            document.getElementById('wallet-address').style.display = 'none';
                        }
                    });
                }
            } catch (e) { console.error(e); }
        }

        async function saveWalletToBackend(walletAddress) {
            try {
                await fetch(`${BACKEND_URL}/api/wallet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: TELEGRAM_ID, wallet: walletAddress })
                });
            } catch (e) {}
        }

        async function increaseScore() {
            const scoreEl = document.getElementById('score');
            scoreEl.innerText = parseInt(scoreEl.innerText) + 1;
            try {
                const res = await fetch(`${BACKEND_URL}/api/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: TELEGRAM_ID })
                });
                const data = await res.json();
                if (data.clicks) scoreEl.innerText = data.clicks;
            } catch (e) {}
        }

        fetch(`${BACKEND_URL}/api/user?telegram_id=${TELEGRAM_ID}&username=${USERNAME}`)
            .then(r => r.json()).then(d => {
                if (d.clicks !== undefined) document.getElementById('score').innerText = d.clicks;
            }).catch(e => {});

        initTonConnect();
    </script>
</body>
</html>
