<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Nexus Quest</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tonconnect-ui/2.0.9/tonconnect-ui.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            margin-top: 40px;
        }
        .wallet-section {
            margin-bottom: 30px;
        }
        .connect-btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,136,204,0.4);
        }
        .wallet-info {
            font-size: 14px;
            color: #00ebc7;
            margin-top: 10px;
            background: #2c2c2e;
            padding: 8px;
            border-radius: 8px;
            display: none;
            word-break: break-all;
        }
        .click-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #0088cc, #0077b5);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,136,204,0.4);
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.1s ease;
        }
        .click-btn:active {
            transform: scale(0.95);
        }
        .score-board {
            font-size: 28px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="wallet-section">
            <button id="wallet-btn" class="connect-btn" onclick="connectRealWallet()">🔗 اتصال به کیف پول واقعی TON</button>
            <div id="wallet-address" class="wallet-info"></div>
        </div>

        <div class="game-area">
            <button class="click-btn" onclick="increaseScore()">بزن!</button>
            <div class="score-board">امتیاز: <span id="score">0</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ورژن v=4 برای آپدیت آنی کش تلگرام
        const BACKEND_URL = 'https://mybot-gx1a.onrender.com?v=4';
        
        const user = tg.initDataUnsafe?.user;
        const TELEGRAM_ID = user ? user.id : 123456789;
        const USERNAME = user ? (user.username || user.first_name) : 'Guest';

        let tonConnectUI;

        // مقداردهی اولیه تون‌کانکت
        try {
            tonConnectUI = new TONConnectUI.TonConnectUI({
                manifestUrl: 'https://maryoa61.github.io/mybot/tonconnect-manifest.json'
            });

            // گوش دادن به وضعیت ولت و دریافت آدرس واقعی
            tonConnectUI.onStatusChange(wallet => {
                if (wallet) {
                    // دریافت آدرس واقعی و خام از بلاکچین تون
                    const realAddress = wallet.account.address; 
                    
                    document.getElementById('wallet-btn').style.display = 'none';
                    const infoDiv = document.getElementById('wallet-address');
                    
                    // نمایش آدرس واقعی به صورت فرمت کوتاه شده
                    infoDiv.innerText = `ولّت واقعی متصل شد: ${realAddress.substring(0, 6)}...${realAddress.substring(realAddress.length - 6)}`;
                    infoDiv.style.display = 'block';
                    
                    // ذخیره آدرس واقعی در دیتابیس سوپابیس شما
                    saveWalletToBackend(realAddress);
                }
            });
        } catch (e) {
            console.error("خطا در لود تون کانکت:", e);
        }

        // تابع باز کردن منوی ولت‌های واقعی تلگرام و تون‌کیپر
        async function connectRealWallet() {
            try {
                if (tonConnectUI) {
                    // باز کردن منوی رسمی انتخاب ولت
                    await tonConnectUI.openModal();
                } else {
                    alert("کتابخانه ولت هنوز بارگذاری نشده است، لحظاتی دیگر تلاش کنید.");
                }
            } catch (innerError) {
                console.error("خطا در باز کردن مودال ولت:", innerError);
            }
        }

        async function saveWalletToBackend(walletAddress) {
            try {
                await fetch(`${BACKEND_URL.split('?')[0]}/api/wallet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: TELEGRAM_ID, wallet: walletAddress })
                });
            } catch (e) {
                console.error("خطا در ذخیره ولت:", e);
            }
        }

        // دریافت امتیاز اولیه کاربر
        async function loadUserData() {
            try {
                const response = await fetch(`${BACKEND_URL.split('?')[0]}/api/user?telegram_id=${TELEGRAM_ID}&username=${USERNAME}`);
                const data = await response.json();
                if (data && data.clicks !== undefined) {
                    document.getElementById('score').innerText = data.clicks;
                }
            } catch (error) {
                console.error("خطا در بارگذاری اطلاعات کاربر:", error);
            }
        }

        // تابع ثبت کلیک
        async function increaseScore() {
            try {
                const response = await fetch(`${BACKEND_URL.split('?')[0]}/api/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: TELEGRAM_ID })
                });
                const data = await response.json();
                if (data && data.clicks !== undefined) {
                    document.getElementById('score').innerText = data.clicks;
                }
            } catch (error) {
                console.error("خطا در ثبت کلیک:", error);
            }
        }

        loadUserData();
    </script>
</body>
</html>
