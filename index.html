<!DOCTYPE html>
<html lang="fa" dir="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CyberCore: Energy Nexus</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ─── Tokens ─────────────────────────────────────────── */
    :root {
      --c-bg:       #03010a;
      --c-surface:  #0a0714;
      --c-border:   rgba(120,80,255,.18);
      --c-border2:  rgba(0,240,200,.12);
      --c-primary:  #7c3aff;
      --c-accent:   #00f0c8;
      --c-danger:   #ff2d6e;
      --c-text:     #ddd6fe;
      --c-muted:    #6b6880;
      --c-glow-p:   rgba(124,58,255,.45);
      --c-glow-a:   rgba(0,240,200,.35);
      --c-glow-d:   rgba(255,45,110,.4);
      --r-card:     20px;
      --font-title: 'Oxanium', sans-serif;
      --font-mono:  'Space Mono', monospace;
    }

    /* ─── Reset ──────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ─── Body ───────────────────────────────────────────── */
    body {
      font-family: var(--font-title);
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Background grid ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,58,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,255,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* Scan-line overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.15) 2px,
        rgba(0,0,0,.15) 4px
      );
      pointer-events: none; z-index: 1;
    }

    /* ─── Noise canvas ───────────────────────────────────── */
    #noise-layer {
      position: fixed; inset: 0;
      opacity: .035;
      pointer-events: none; z-index: 2;
    }

    /* ─── Ambient orbs ───────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none; z-index: 0;
    }
    .orb-1 { width:340px; height:340px; top:-80px; left:-80px;  background: var(--c-glow-p); opacity:.4; animation: orbDrift1 18s ease-in-out infinite alternate; }
    .orb-2 { width:280px; height:280px; bottom:60px; right:-60px; background: var(--c-glow-a); opacity:.3; animation: orbDrift2 22s ease-in-out infinite alternate; }
    .orb-3 { width:200px; height:200px; top:50%; left:50%; transform:translate(-50%,-50%); background: var(--c-glow-d); opacity:.15; animation: orbDrift3 14s ease-in-out infinite alternate; }

    @keyframes orbDrift1 { from{transform:translate(0,0)} to{transform:translate(40px,30px)} }
    @keyframes orbDrift2 { from{transform:translate(0,0)} to{transform:translate(-30px,-40px)} }
    @keyframes orbDrift3 { from{transform:translate(-50%,-50%) scale(1)} to{transform:translate(-50%,-50%) scale(1.3)} }

    /* ─── Layout wrapper ─────────────────────────────────── */
    .app-wrapper {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 24px;
      gap: 16px;
    }

    /* ─── Header ─────────────────────────────────────────── */
    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 4px 8px;
    }

    .brand { display:flex; flex-direction:column; gap:2px; }
    .brand-name {
      font-size: 1.3rem; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(120deg, var(--c-primary) 0%, var(--c-accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-ver {
      font-family: var(--font-mono);
      font-size: .62rem; color: var(--c-muted);
      letter-spacing: 2px; text-transform: uppercase;
    }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(0,240,200,.06);
      border: 1px solid var(--c-border2);
      border-radius: 50px;
      font-family: var(--font-mono); font-size: .62rem;
      color: var(--c-accent); text-transform: uppercase;
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--c-accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ opacity:.3; transform:scale(.8) }
      50%    { opacity:1;   transform:scale(1.2) }
    }

    /* ─── Glass card ─────────────────────────────────────── */
    .card {
      width: 100%;
      background: rgba(10,7,20,.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--c-border);
      border-radius: var(--r-card);
      padding: 16px 18px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(124,58,255,.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ─── Identity row ───────────────────────────────────── */
    .identity-row {
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: .68rem;
      color: var(--c-muted);
      border-bottom: 1px solid rgba(255,255,255,.05);
      padding-bottom: 10px; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .identity-row .id-val { color: var(--c-text); }
    .identity-row .user-val { color: var(--c-accent); }

    /* ─── Score block ────────────────────────────────────── */
    .score-label {
      font-family: var(--font-mono); font-size: .65rem;
      color: var(--c-muted); letter-spacing: 2px; text-transform: uppercase;
    }
    .score-value {
      font-size: 3.2rem; font-weight: 800;
      color: #fff; line-height: 1.05;
      letter-spacing: -1px;
      text-shadow: 0 0 20px rgba(124,58,255,.5), 0 0 40px rgba(124,58,255,.2);
      transition: color .1s;
    }
    .score-value.flash { color: var(--c-accent); }

    .score-meta {
      display: flex; gap: 16px; margin-top: 6px;
    }
    .stat-chip {
      font-family: var(--font-mono); font-size: .65rem;
      color: var(--c-muted); display: flex; align-items: center; gap: 4px;
    }
    .stat-chip span { color: var(--c-text); font-size: .7rem; }

    /* ─── Level system ───────────────────────────────────── */
    .level-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 14px; margin-bottom: 6px;
    }
    .level-name {
      font-size: .8rem; font-weight: 600; letter-spacing: .5px;
      color: var(--c-danger);
      text-shadow: 0 0 8px var(--c-glow-d);
    }
    .level-frac {
      font-family: var(--font-mono); font-size: .65rem; color: var(--c-muted);
    }

    .xp-track {
      width: 100%; height: 6px;
      background: rgba(255,255,255,.05);
      border-radius: 99px; overflow: hidden;
      border: 1px solid rgba(255,255,255,.04);
    }
    .xp-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--c-primary), var(--c-accent));
      border-radius: 99px;
      box-shadow: 0 0 8px var(--c-glow-p);
      transition: width .35s cubic-bezier(.22,1,.36,1);
    }

    /* Rank badges (milestone display) */
    .rank-strip {
      display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
    }
    .rank-pip {
      padding: 3px 8px;
      border-radius: 4px;
      font-family: var(--font-mono); font-size: .58rem;
      letter-spacing: 1px; text-transform: uppercase;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      color: var(--c-muted);
      transition: all .3s;
    }
    .rank-pip.unlocked {
      background: rgba(124,58,255,.15);
      border-color: var(--c-primary);
      color: #c4b5fd;
      box-shadow: 0 0 6px rgba(124,58,255,.3);
    }
    .rank-pip.current {
      background: rgba(255,45,110,.15);
      border-color: var(--c-danger);
      color: #fda4b8;
      box-shadow: 0 0 8px var(--c-glow-d);
    }

    /* ─── Core button area ───────────────────────────────── */
    .core-area {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 240px; height: 240px;
      margin: 4px 0;
    }

    /* Rotating rings */
    .ring {
      position: absolute; border-radius: 50%;
      pointer-events: none;
    }
    .ring-1 {
      inset: -12px;
      border: 1.5px dashed rgba(0,240,200,.2);
      animation: spin 20s linear infinite;
    }
    .ring-2 {
      inset: -28px;
      border: 1px dashed rgba(124,58,255,.15);
      animation: spin 32s linear infinite reverse;
    }
    .ring-3 {
      inset: -46px;
      border: 1px solid transparent;
      border-top-color: rgba(255,45,110,.2);
      border-right-color: rgba(255,45,110,.1);
      animation: spin 12s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Corner tick marks on ring-2 */
    .ring-tick {
      position: absolute;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--c-primary);
      box-shadow: 0 0 6px var(--c-primary);
      pointer-events: none;
    }

    /* Main button */
    .core-btn {
      position: relative;
      width: 200px; height: 200px;
      border-radius: 50%; border: none; outline: none; cursor: pointer;
      background: radial-gradient(circle at 35% 35%,
        #5b21b6 0%, #3b0764 45%, #0d0118 100%);
      box-shadow:
        0 0 0 1px rgba(124,58,255,.3),
        0 0 20px rgba(124,58,255,.35),
        0 0 60px rgba(124,58,255,.12),
        inset 0 0 30px rgba(0,0,0,.5),
        inset 0 2px 4px rgba(255,255,255,.12);
      display: flex; align-items: center; justify-content: center;
      transition: transform .07s ease, box-shadow .1s ease;
      touch-action: manipulation;
    }

    .core-btn:active {
      transform: scale(.93);
      box-shadow:
        0 0 0 1px rgba(124,58,255,.5),
        0 0 30px rgba(124,58,255,.6),
        0 0 80px rgba(124,58,255,.2),
        inset 0 0 30px rgba(0,0,0,.5),
        inset 0 2px 4px rgba(255,255,255,.12);
    }

    .core-inner {
      width: 148px; height: 148px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,240,200,.55) 0%, rgba(30,5,80,.9) 65%);
      border: 1.5px solid rgba(0,240,200,.25);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      box-shadow: inset 0 0 20px rgba(0,240,200,.1);
    }

    .core-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 0 10px var(--c-accent));
      transition: transform .15s ease;
    }
    .core-btn:active .core-icon { transform: scale(1.2) rotate(-10deg); }

    .core-caption {
      font-family: var(--font-mono); font-size: .58rem;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--c-accent);
    }

    /* Ripple effect on click */
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--c-accent);
      pointer-events: none;
      animation: rippleOut .6s ease-out forwards;
    }
    @keyframes rippleOut {
      from { width:20px; height:20px; opacity:.8; transform:translate(-50%,-50%) scale(1); }
      to   { width:200px; height:200px; opacity:0; transform:translate(-50%,-50%) scale(1); }
    }

    /* Float label */
    .floater {
      position: absolute;
      font-family: var(--font-title); font-size: 1.5rem; font-weight: 800;
      color: var(--c-accent);
      text-shadow: 0 0 10px var(--c-glow-a);
      pointer-events: none; z-index: 50;
      animation: floatUp .75s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform:translateY(0) scale(.8); }
      100% { opacity:0; transform:translateY(-80px) scale(1.2); }
    }

    /* ─── Milestones strip ───────────────────────────────── */
    .milestones-card {
      width: 100%;
    }
    .section-label {
      font-family: var(--font-mono); font-size: .62rem;
      color: var(--c-muted); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .milestone-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .milestone-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 10px 6px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      font-family: var(--font-mono); font-size: .6rem;
      color: var(--c-muted); text-align: center; letter-spacing: .5px;
      transition: all .3s;
    }
    .milestone-item.done {
      background: rgba(124,58,255,.1);
      border-color: rgba(124,58,255,.3);
      color: #c4b5fd;
    }
    .milestone-item.done .m-icon { filter: none; }
    .m-icon {
      font-size: 1.3rem;
      filter: grayscale(1) opacity(.4);
      transition: filter .3s;
    }
    .milestone-item.done .m-icon { filter: drop-shadow(0 0 6px var(--c-primary)); }
    .m-req { font-size: .58rem; color: var(--c-muted); }

    /* ─── Wallet panel ───────────────────────────────────── */
    .wallet-card {
      width: 100%;
    }
    .wallet-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .wallet-info { display:flex; flex-direction:column; gap:3px; }
    .wallet-title {
      font-size: .85rem; font-weight: 600; color: var(--c-text);
    }
    .wallet-desc {
      font-family: var(--font-mono); font-size: .6rem;
      color: var(--c-muted); text-transform: uppercase; letter-spacing: 1px;
    }
    #ton-connect-btn { flex-shrink: 0; }

    /* ─── Toast ──────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      width: calc(100% - 32px); max-width: 440px;
      background: rgba(6,2,18,.95);
      border: 1px solid var(--c-danger);
      border-radius: 14px;
      padding: 11px 16px;
      box-shadow: 0 0 20px rgba(255,45,110,.2);
      display: flex; align-items: center; gap: 10px;
      font-size: .82rem;
      z-index: 500;
      transition: transform .35s cubic-bezier(.175,.885,.32,1.275);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast-ico { color: var(--c-danger); font-size: .9rem; }

    /* ─── Footer ─────────────────────────────────────────── */
    footer {
      font-family: var(--font-mono); font-size: .6rem;
      color: var(--c-muted); text-align: center;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 4px 0 8px;
    }
    footer a { color: var(--c-accent); text-decoration: none; }

    /* ─── Level up flash ─────────────────────────────────── */
    .levelup-flash {
      position: fixed; inset: 0; z-index: 300;
      background: radial-gradient(circle, rgba(124,58,255,.3) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity .1s;
    }
    .levelup-flash.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Ambient -->
  <canvas id="noise-layer"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="levelup-flash" id="levelup-flash"></div>

  <div class="app-wrapper">

    <!-- ── Header ── -->
    <header>
      <div class="brand">
        <span class="brand-name">CYBERCORE</span>
        <span class="brand-ver">Energy Nexus v2.0</span>
      </div>
      <div class="status-pill">
        <div class="pulse-dot"></div>
        <span>NODE ONLINE</span>
      </div>
    </header>

    <!-- ── Stats card ── -->
    <div class="card">
      <div class="identity-row">
        <span>USER: <span class="user-val" id="el-username">@runner</span></span>
        <span>ID: <span class="id-val" id="el-uid">-</span></span>
      </div>

      <div class="score-label">EXTRACTED ENERGY</div>
      <div class="score-value" id="el-score">0</div>

      <div class="score-meta">
        <div class="stat-chip">SESSION <span id="el-session">+0</span></div>
        <div class="stat-chip">CPS <span id="el-cps">0.0</span></div>
        <div class="stat-chip">RANK <span id="el-rank-short">—</span></div>
      </div>

      <div class="level-row">
        <span class="level-name" id="el-level-name">LVL 1 · CORE NOVICE</span>
        <span class="level-frac" id="el-xp-frac">0 / 100</span>
      </div>
      <div class="xp-track"><div class="xp-fill" id="el-xp-bar"></div></div>

      <!-- Rank pips -->
      <div class="rank-strip" id="el-rank-strip"></div>
    </div>

    <!-- ── Core button ── -->
    <div class="core-area" id="core-area">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <button class="core-btn" id="core-btn" aria-label="Tap Energy Core">
        <div class="core-inner">
          <div class="core-icon" id="el-icon">⚡</div>
          <div class="core-caption">TAP TO HARVEST</div>
        </div>
      </button>
    </div>

    <!-- ── Milestones ── -->
    <div class="card milestones-card">
      <div class="section-label">ACHIEVEMENTS</div>
      <div class="milestone-grid" id="el-milestones"></div>
    </div>

    <!-- ── Wallet ── -->
    <div class="card wallet-card">
      <div class="wallet-inner">
        <div class="wallet-info">
          <span class="wallet-title">TON Wallet</span>
          <span class="wallet-desc">Connect for airdrops</span>
        </div>
        <div id="ton-connect-btn"></div>
      </div>
    </div>

    <footer>
      ENGINE: <a href="https://mybot-gx1a.onrender.com" target="_blank">MYBOT-GX1A</a>
    </footer>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-ico">⚡</span>
    <span id="toast-msg">System online.</span>
  </div>

  <script>
  (() => {
    /* ── Config ──────────────────────────────────────── */
    const BACKEND = "https://mybot-gx1a.onrender.com";
    const CB = "?cb=" + Math.random().toString(36).slice(2, 7);

    /* ── Level definitions ───────────────────────────── */
    const LEVELS = [
      { threshold:    0, name: "CORE NOVICE",      icon: "⚡", short: "N1" },
      { threshold:  100, name: "MATRIX RUNNER",    icon: "🔷", short: "M2" },
      { threshold:  250, name: "GRID HACKER",      icon: "🔥", short: "G3" },
      { threshold:  500, name: "SYNAPSE RACER",    icon: "☄️", short: "S4" },
      { threshold: 1000, name: "VOID WALKER",      icon: "🌀", short: "V5" },
      { threshold: 2000, name: "QUANTUM KING",     icon: "🔮", short: "Q6" },
      { threshold: 5000, name: "NEXUS SOVEREIGN",  icon: "🧬", short: "X7" },
    ];

    /* ── Milestones ──────────────────────────────────── */
    const MILESTONES = [
      { req:    10, icon: "🎯", label: "FIRST 10"   },
      { req:    50, icon: "💥", label: "50 CLICKS"  },
      { req:   100, icon: "🏆", label: "CENTURY"    },
      { req:   250, icon: "⚡", label: "SURGE"      },
      { req:   500, icon: "🚀", label: "LAUNCH"     },
      { req:  1000, icon: "🌟", label: "KILO-CORE"  },
    ];

    /* ── State ───────────────────────────────────────── */
    const state = {
      telegram_id: 11112222,
      username: "external_runner",
      clicks: 0,
      sessionClicks: 0,
      wallet: null,
      prevLevel: 0,
    };

    /* CPS tracker */
    let cpsBuffer = [];
    function recordClick() {
      cpsBuffer.push(Date.now());
      cpsBuffer = cpsBuffer.filter(t => Date.now() - t < 1000);
    }
    setInterval(() => {
      document.getElementById("el-cps").textContent = cpsBuffer.length.toFixed(1);
    }, 200);

    /* ── Telegram SDK ────────────────────────────────── */
    let tg = null;
    try {
      if (window.Telegram?.WebApp) {
        tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const u = tg.initDataUnsafe?.user;
        if (u) {
          state.telegram_id = u.id;
          state.username = u.username || `user_${u.id}`;
        }
      }
    } catch(e) { console.warn("Telegram SDK not available", e); }

    /* ── DOM refs ────────────────────────────────────── */
    const elScore    = document.getElementById("el-score");
    const elUsername = document.getElementById("el-username");
    const elUid      = document.getElementById("el-uid");
    const elSession  = document.getElementById("el-session");
    const elLevelName= document.getElementById("el-level-name");
    const elXpFrac   = document.getElementById("el-xp-frac");
    const elXpBar    = document.getElementById("el-xp-bar");
    const elIcon     = document.getElementById("el-icon");
    const elRankShort= document.getElementById("el-rank-short");
    const elRankStrip= document.getElementById("el-rank-strip");
    const elMilestones=document.getElementById("el-milestones");
    const coreBtn    = document.getElementById("core-btn");
    const coreArea   = document.getElementById("core-area");

    /* ── Init UI ─────────────────────────────────────── */
    elUsername.textContent = `@${state.username}`;
    elUid.textContent = state.telegram_id;

    buildRankStrip();
    buildMilestones();

    function buildRankStrip() {
      elRankStrip.innerHTML = "";
      LEVELS.forEach((lvl, i) => {
        const pip = document.createElement("div");
        pip.className = "rank-pip";
        pip.id = `pip-${i}`;
        pip.textContent = lvl.short;
        elRankStrip.appendChild(pip);
      });
    }

    function buildMilestones() {
      elMilestones.innerHTML = "";
      MILESTONES.forEach((m, i) => {
        const el = document.createElement("div");
        el.className = "milestone-item";
        el.id = `ms-${i}`;
        el.innerHTML = `
          <div class="m-icon">${m.icon}</div>
          <div>${m.label}</div>
          <div class="m-req">${m.req} clicks</div>
        `;
        elMilestones.appendChild(el);
      });
    }

    /* ── Update UI ───────────────────────────────────── */
    function updateUI(clicks) {
      elScore.textContent = clicks.toLocaleString();
      elSession.textContent = `+${state.sessionClicks}`;

      // Compute level
      let levelIdx = 0;
      for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (clicks >= LEVELS[i].threshold) { levelIdx = i; break; }
      }
      const lvl = LEVELS[levelIdx];
      const nextLvl = LEVELS[levelIdx + 1];
      const baseXP = lvl.threshold;
      const rangeXP = nextLvl ? nextLvl.threshold - baseXP : 100;
      const inLevelXP = clicks - baseXP;
      const pct = Math.min(100, (inLevelXP / rangeXP) * 100);

      elLevelName.textContent = `LVL ${levelIdx + 1} · ${lvl.name}`;
      elXpFrac.textContent = nextLvl
        ? `${inLevelXP} / ${rangeXP}`
        : "MAX LEVEL";
      elXpBar.style.width = pct + "%";
      elIcon.textContent = lvl.icon;
      elRankShort.textContent = lvl.short;

      // Rank pips
      LEVELS.forEach((_, i) => {
        const pip = document.getElementById(`pip-${i}`);
        pip.className = "rank-pip" +
          (i < levelIdx ? " unlocked" : i === levelIdx ? " current" : "");
      });

      // Level-up flash
      if (levelIdx > state.prevLevel) {
        triggerLevelUp();
        showToast(`⬆ LEVEL UP! ${lvl.name}`);
      }
      state.prevLevel = levelIdx;

      // Milestones
      MILESTONES.forEach((m, i) => {
        if (clicks >= m.req) {
          document.getElementById(`ms-${i}`).classList.add("done");
        }
      });
    }

    function triggerLevelUp() {
      const flash = document.getElementById("levelup-flash");
      flash.classList.add("show");
      setTimeout(() => flash.classList.remove("show"), 400);
    }

    /* ── Toast ───────────────────────────────────────── */
    let toastTimer = null;
    function showToast(msg) {
      const toast = document.getElementById("toast");
      document.getElementById("toast-msg").textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 3200);
    }

    /* ── Noise canvas ────────────────────────────────── */
    (function initNoise() {
      const canvas = document.getElementById("noise-layer");
      const ctx = canvas.getContext("2d");
      function draw() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        const img = ctx.createImageData(canvas.width, canvas.height);
        for (let i = 0; i < img.data.length; i += 4) {
          const v = Math.random() * 255 | 0;
          img.data[i] = img.data[i+1] = img.data[i+2] = v;
          img.data[i+3] = 255;
        }
        ctx.putImageData(img, 0, 0);
      }
      draw();
      setInterval(draw, 80);
    })();

    /* ── Audio helper ────────────────────────────────── */
    function playClick() {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(520, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + .1);
        g.gain.setValueAtTime(.05, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .1);
        osc.connect(g); g.connect(ac.destination);
        osc.start(); osc.stop(ac.currentTime + .1);
      } catch(e) {}
    }

    /* ── Floater ─────────────────────────────────────── */
    function spawnFloater(x, y) {
      const f = document.createElement("span");
      f.className = "floater";
      f.textContent = "+1";
      f.style.left = (x - coreArea.getBoundingClientRect().left) + "px";
      f.style.top  = (y - coreArea.getBoundingClientRect().top)  + "px";
      coreArea.appendChild(f);
      setTimeout(() => f.remove(), 750);
    }

    /* ── Ripple ──────────────────────────────────────── */
    function spawnRipple(x, y) {
      const r = document.createElement("div");
      r.className = "ripple";
      r.style.left = x + "px";
      r.style.top  = y + "px";
      coreBtn.appendChild(r);
      setTimeout(() => r.remove(), 600);
    }

    /* ── Fetch user ──────────────────────────────────── */
    async function fetchUser() {
      try {
        const params = new URLSearchParams({
          telegram_id: state.telegram_id,
          username: state.username
        });
        const res = await fetch(`${BACKEND}/api/user?${params}${CB}`);
        if (!res.ok) throw new Error(res.status);
        const { success, data } = await res.json();
        if (success && data) {
          state.clicks = data.clicks || 0;
          state.wallet = data.wallet || null;
        }
      } catch(e) {
        showToast("Running on local cache.");
      } finally {
        updateUI(state.clicks);
      }
    }

    fetchUser();

    /* ── Click handler ───────────────────────────────── */
    coreBtn.addEventListener("click", async (e) => {
      playClick();
      recordClick();

      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");

      const rect  = coreBtn.getBoundingClientRect();
      const cx = (e.clientX ?? rect.left + rect.width  / 2);
      const cy = (e.clientY ?? rect.top  + rect.height / 2);
      const bx = cx - rect.left;
      const by = cy - rect.top;

      spawnRipple(bx, by);
      spawnFloater(cx, cy);

      // Optimistic update
      state.clicks++;
      state.sessionClicks++;
      updateUI(state.clicks);

      // Flash score
      elScore.classList.add("flash");
      setTimeout(() => elScore.classList.remove("flash"), 100);

      // Sync backend
      try {
        const res = await fetch(`${BACKEND}/api/click`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ telegram_id: state.telegram_id })
        });
        if (res.ok) {
          const { clicks } = await res.json();
          if (clicks !== undefined) {
            state.clicks = clicks;
            updateUI(state.clicks);
          }
        }
      } catch(e) { /* fallback to local */ }
    });

    /* ── TON Connect ─────────────────────────────────── */
    try {
      if (typeof TonConnectUI !== 'undefined' && TonConnectUI.TonConnectUI) {
        const tc = new TonConnectUI.TonConnectUI({
          manifestUrl: "https://maryoa61.github.io/mybot/tonconnect-manifest.json",
          buttonRootId: "ton-connect-btn"
        });
        tc.onStatusChange(async (wallet) => {
          if (wallet?.account?.address) {
            const addr = wallet.account.address;
            const short = addr.slice(0, 6) + "…" + addr.slice(-4);
            showToast(`Wallet linked: ${short}`);
            try {
              await fetch(`${BACKEND}/api/wallet`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ telegram_id: state.telegram_id, wallet: addr })
              });
              state.wallet = addr;
            } catch(e) {}
          } else {
            state.wallet = null;
          }
        });
      }
    } catch(e) { console.error("TON Connect init error", e); }

  })();
  </script>
</body>
</html>
