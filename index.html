<script>
        // آدرس سرور رندر شما
        const BACKEND_URL = 'https://mybot-gx1a.onrender.com';
        
        // اینجا به صورت موقت یک تلگرام آی‌دی تستی می‌گذاریم تا بعداً از خود تلگرام بگیریم
        const TELEGRAM_ID = 123456789; 
        const USERNAME = 'TestUser';

        // راه‌اندازی دکمه اتصال به ولت تون
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tonconnect-manifest/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        // دریافت امتیاز اولیه کاربر از دیتابیس به محض لود شدن صفحه
        async function loadUserData() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/user?telegram_id=${TELEGRAM_ID}&username=${USERNAME}`);
                const data = await response.json();
                if (data && data.clicks !== undefined) {
                    document.getElementById('score').innerText = data.clicks;
                }
            } catch (error) {
                console.error("خطا در بارگذاری اطلاعات کاربر:", error);
            }
        }

        // تابع ثبت کلیک و افزایش امتیاز در سرور و دیتابیس
        async function increaseScore() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/click`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        telegram_id: TELEGRAM_ID
                    })
                });
                
                const data = await response.json();
                if (data && data.clicks !== undefined) {
                    // به‌روزرسانی گرافیکی امتیاز در صفحه بر اساس دیتابیس
                    document.getElementById('score').innerText = data.clicks;
                }
            } catch (error) {
                console.error("خطا در ثبت کلیک:", error);
            }
        }

        // اجرای تابع لود اولیه هنگام باز شدن صفحه
        loadUserData();
    </script>
